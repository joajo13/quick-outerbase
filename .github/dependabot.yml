# Dependabot: chequea dependencias y workflows semanalmente y abre PRs de update.
# Defensa en profundidad (M1): mantiene al día las deps del runtime y las actions.
version: 2
updates:
  # Dependencias npm de la app (el bundle precompilado se buildea desde acá).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # @libsql/client está pineado a propósito vía `overrides` en package.json
    # (^0.5.3) por el empaquetado de binarios nativos que el release copia a mano
    # (ver release-bundles.yml). Dependabot no puede subirlo sin chocar con ese
    # override (dependency_file_not_resolvable), así que lo ignoramos acá. Subirlo
    # de verdad (0.5 → 0.17) es una tarea aparte que requiere testear el bundle.
    ignore:
      - dependency-name: "@libsql/client"
    # Agrupamos los patches/minors para no inundar de PRs.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions usadas en los workflows (release-bundles, check).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
